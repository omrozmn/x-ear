name: Deploy to GitHub Pages

on:
  push:
    branches:
      - landing-pages-deploy
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Landing deps
        run: cd apps/landing && npm ci

      - name: Build Landing
        run: cd apps/landing && npx next build --webpack
        env:
          PAGES_BASE_PATH: /x-ear

      - name: Prepare deploy
        run: |
          mkdir -p deploy
          cp -r apps/landing/out/. deploy/
          touch deploy/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
