name: Deploy to GitHub Pages

on:
  push:
    branches:
      - landing-pages-deploy
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install all dependencies
        run: pnpm install --frozen-lockfile

      # ── Landing (Next.js static export) ──────────────────────────
      - name: Build Landing
        id: build_landing
        continue-on-error: true
        run: cd apps/landing && pnpm exec next build --webpack 2>&1 | tee /tmp/landing-build.log
        env:
          PAGES_BASE_PATH: /x-ear

      # ── Web App (Vite React SPA) ──────────────────────────────────
      - name: Build Web
        id: build_web
        continue-on-error: true
        run: cd apps/web && pnpm exec vite build 2>&1 | tee /tmp/web-build.log
        env:
          VITE_BASE: /x-ear/app/

      # ── Admin Panel (Vite React SPA) ──────────────────────────────
      - name: Build Admin
        id: build_admin
        continue-on-error: true
        run: cd apps/admin && pnpm exec vite build 2>&1 | tee /tmp/admin-build.log
        env:
          VITE_BASE: /x-ear/admin/

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/*-build.log

      - name: Check build results
        run: |
          failed=0
          for app in landing web admin; do
            id="build_${app}"
            outcome="${{ steps.build_landing.outcome }}${{ steps.build_web.outcome }}${{ steps.build_admin.outcome }}"
          done
          if [ "${{ steps.build_landing.outcome }}" = "failure" ]; then
            echo "::error::Landing build failed"; tail -30 /tmp/landing-build.log; failed=1
          fi
          if [ "${{ steps.build_web.outcome }}" = "failure" ]; then
            echo "::error::Web build failed"; tail -30 /tmp/web-build.log; failed=1
          fi
          if [ "${{ steps.build_admin.outcome }}" = "failure" ]; then
            echo "::error::Admin build failed"; tail -30 /tmp/admin-build.log; failed=1
          fi
          exit $failed

      # ── Combine all outputs ───────────────────────────────────────
      - name: Combine outputs
        run: |
          mkdir -p deploy
          # Landing at root
          cp -r apps/landing/out/. deploy/
          touch deploy/.nojekyll
          # Web app at /app/
          mkdir -p deploy/app
          cp -r apps/web/dist/. deploy/app/
          # SPA fallback: GitHub Pages serves 404.html for unknown routes
          cp deploy/app/index.html deploy/app/404.html
          # Admin at /admin/
          mkdir -p deploy/admin
          cp -r apps/admin/dist/. deploy/admin/
          cp deploy/admin/index.html deploy/admin/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
