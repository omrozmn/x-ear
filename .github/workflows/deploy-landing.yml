name: Deploy to GitHub Pages

on:
  push:
    branches:
      - landing-pages-deploy
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Remove pnpm workspace:* refs that npm can't resolve
      # Replace with file: protocol pointing to local paths
      - name: Patch workspace protocol for npm
        run: |
          node -e "
            const fs = require('fs');
            const patches = [
              { file: 'packages/ui-web/package.json', from: '\"workspace:*\"', to: '\"file:../core\"' },
              { file: 'packages/ui-web/package-lock.json', from: '\"workspace:*\"', to: '\"file:../core\"' },
              { file: 'apps/web/package-lock.json', from: '\"workspace:*\"', to: '\"file:../../packages/core\"' },
              { file: 'apps/admin/package-lock.json', from: '\"workspace:*\"', to: '\"file:../../packages/core\"' },
            ];
            patches.forEach(({ file, from, to }) => {
              let txt = fs.readFileSync(file, 'utf8');
              txt = txt.split(from).join(to);
              fs.writeFileSync(file, txt);
            });
          "

      # ── Install dependencies ──────────────────────────────────────
      - name: Install workspace package deps
        run: |
          cd packages/core && npm ci
          cd ../ui-web && npm install --legacy-peer-deps

      - name: Install Landing deps
        run: cd apps/landing && npm ci

      - name: Install Web deps
        run: cd apps/web && npm install --legacy-peer-deps

      - name: Install Admin deps
        run: cd apps/admin && npm install --legacy-peer-deps

      # ── Landing (Next.js static export) ──────────────────────────
      - name: Build Landing
        run: cd apps/landing && npx next build --webpack
        env:
          PAGES_BASE_PATH: /x-ear

      # ── Web App (Vite React SPA) ──────────────────────────────────
      - name: Build Web
        run: cd apps/web && npx vite build
        env:
          VITE_BASE: /x-ear/app/

      # ── Admin Panel (Vite React SPA) ──────────────────────────────
      - name: Build Admin
        run: cd apps/admin && npx vite build
        env:
          VITE_BASE: /x-ear/admin/

      # ── Combine all outputs ───────────────────────────────────────
      - name: Combine outputs
        run: |
          mkdir -p deploy
          cp -r apps/landing/out/. deploy/
          touch deploy/.nojekyll
          mkdir -p deploy/app
          cp -r apps/web/dist/. deploy/app/
          cp deploy/app/index.html deploy/app/404.html
          mkdir -p deploy/admin
          cp -r apps/admin/dist/. deploy/admin/
          cp deploy/admin/index.html deploy/admin/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
