name: Deploy to GitHub Pages

on:
  push:
    branches:
      - landing-pages-deploy
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Landing (Next.js static export) ──────────────────────────
      - name: Install Landing deps
        run: cd apps/landing && npm ci

      - name: Build Landing
        run: cd apps/landing && npm run build
        env:
          PAGES_BASE_PATH: /x-ear

      # ── Web App (Vite React SPA) ──────────────────────────────────
      - name: Install Web deps
        run: cd apps/web && npm ci

      - name: Build Web
        run: cd apps/web && npx vite build
        env:
          VITE_BASE: /x-ear/app/

      # ── Admin Panel (Vite React SPA) ──────────────────────────────
      - name: Install Admin deps
        run: cd apps/admin && npm ci

      - name: Build Admin
        run: cd apps/admin && npx vite build
        env:
          VITE_BASE: /x-ear/admin/

      # ── Combine all outputs ───────────────────────────────────────
      - name: Combine outputs
        run: |
          mkdir -p deploy
          # Landing at root
          cp -r apps/landing/out/. deploy/
          touch deploy/.nojekyll
          # Web app at /app/
          mkdir -p deploy/app
          cp -r apps/web/dist/. deploy/app/
          # SPA fallback: GitHub Pages serves 404.html for unknown routes
          cp deploy/app/index.html deploy/app/404.html
          # Admin at /admin/
          mkdir -p deploy/admin
          cp -r apps/admin/dist/. deploy/admin/
          cp deploy/admin/index.html deploy/admin/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
