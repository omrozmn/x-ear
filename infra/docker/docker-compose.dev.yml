# Docker Compose for Local Development
#
# Usage:
#   docker compose -f infra/docker/docker-compose.dev.yml up -d
#
# Services: PostgreSQL 16, Redis 7, pgAdmin (optional)

services:
  postgres:
    image: postgres:16-alpine
    container_name: xear-postgres-dev
    environment:
      POSTGRES_USER: xear
      POSTGRES_PASSWORD: xear_dev_password
      POSTGRES_DB: xear_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xear -d xear_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: xear-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Optional: pgAdmin for database management (http://localhost:5050)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: xear-pgadmin-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@xear.app
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
