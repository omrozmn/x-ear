[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    hearing_flow: marks tests as hearing flow integration tests (deselect with '-m "not hearing_flow"')
    property_test: Property-based tests using Hypothesis
    integration: Integration tests requiring external services
    slow: Slow-running tests
    real_bounce: tests that need real BounceHandlerService (not mocked)
    real_spf: tests that need real SPF validation (not mocked)
