upstream xear_core {
    server host.docker.internal:5000;
}

upstream hbys_clinical {
    server hbys-clinical:8101;
}

upstream hbys_diagnosis {
    server hbys-diagnosis:8102;
}

upstream hbys_prescription {
    server hbys-prescription:8103;
}

upstream hbys_laboratory {
    server hbys-laboratory:8104;
}

upstream hbys_pharmacy {
    server hbys-pharmacy:8105;
}

upstream hbys_imaging {
    server hbys-imaging:8106;
}

upstream hbys_emergency {
    server hbys-emergency:8107;
}

upstream hbys_surgery {
    server hbys-surgery:8108;
}

upstream hbys_inpatient {
    server hbys-inpatient:8109;
}

upstream hbys_cdss {
    server hbys-cdss:8110;
}

upstream hbys_fhir {
    server hbys-fhir:8111;
}

upstream hbys_gov {
    server hbys-gov-integration:8112;
}

upstream hbys_realtime {
    server hbys-realtime:8113;
}

upstream hbys_device {
    server hbys-medical-device:8114;
}

server {
    listen 80;
    server_name localhost;

    # Health check
    location /gateway/health {
        return 200 '{"status":"ok","gateway":"hbys"}';
        add_header Content-Type application/json;
    }

    # ─── X-EAR Core API (mevcut sistem, dokunulmaz) ───
    location /api/ {
        # Default: X-EAR core API'ye yönlendir
        proxy_pass http://xear_core;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── HBYS Microservices ───

    location /api/hbys/clinical {
        proxy_pass http://hbys_clinical;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/hbys/diagnoses {
        proxy_pass http://hbys_diagnosis;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/hbys/prescriptions {
        proxy_pass http://hbys_prescription;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/hbys/medications {
        proxy_pass http://hbys_prescription;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/hbys/laboratory {
        proxy_pass http://hbys_laboratory;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/hbys/pharmacy {
        proxy_pass http://hbys_pharmacy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/hbys/imaging {
        proxy_pass http://hbys_imaging;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/hbys/emergency {
        proxy_pass http://hbys_emergency;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/hbys/surgeries {
        proxy_pass http://hbys_surgery;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/hbys/inpatient {
        proxy_pass http://hbys_inpatient;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/hbys/cdss {
        proxy_pass http://hbys_cdss;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/fhir {
        proxy_pass http://hbys_fhir;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/hbys/gov {
        proxy_pass http://hbys_gov;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket support for realtime notifications
    location /api/hbys/notifications {
        proxy_pass http://hbys_realtime;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location /ws/ {
        proxy_pass http://hbys_realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location /api/hbys/medical-devices {
        proxy_pass http://hbys_device;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
